{% extends "authenticated-base.html" %}

{% block title %}My Todos{% endblock %}

{% block subpage_content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">My Todos</h1>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <div class="input-group">
                <input type="text" id="new-todo-input" class="form-control" placeholder="Add a new todo...">
                <button class="btn btn-primary" onclick="addTodo()">
                    <span class="material-symbols-outlined">add</span> Add Todo
                </button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <ul id="todo-list" class="list-group">
                <li class="list-group-item text-center text-muted">Loading todos...</li>
            </ul>
        </div>
    </div>
</div>

<script>
    async function loadTodos() {
        try {
            const response = await fetch('/api/todos');
            if (response.ok) {
                const todos = await response.json();
                renderTodos(todos);
            } else {
                showError('Failed to load todos');
            }
        } catch (error) {
            console.error('Error:', error);
            showError('Could not connect to server');
        }
    }

    function renderTodos(todos) {
        const list = document.getElementById('todo-list');
        
        if (!todos || todos.length === 0) {
            list.innerHTML = '<li class="list-group-item text-center text-muted">No todos yet. Add one above!</li>';
            return;
        }
        
        list.innerHTML = '';
        todos.forEach(todo => {
            const li = document.createElement('li');
            li.className = 'list-group-item d-flex justify-content-between align-items-center';
            li.innerHTML = `
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" 
                           ${todo.completed ? 'checked' : ''} 
                           onchange="toggleTodo(${todo.id})">
                    <label class="form-check-label ${todo.completed ? 'text-decoration-line-through text-muted' : ''}">
                        ${escapeHtml(todo.title)}
                    </label>
                </div>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteTodo(${todo.id})">
                    <span class="material-symbols-outlined">delete</span>
                </button>
            `;
            list.appendChild(li);
        });
    }

    async function addTodo() {
        const input = document.getElementById('new-todo-input');
        const title = input.value.trim();
        
        if (!title) {
            showToast('Please enter a todo title', 'warning');
            return;
        }
        
        try {
            const response = await fetch('/api/todos', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ title: title })
            });
            
            if (response.ok) {
                input.value = '';
                loadTodos();
                showToast('Todo added successfully!', 'success');
            } else {
                showError('Failed to add todo');
            }
        } catch (error) {
            console.error('Error:', error);
            showError('Could not add todo');
        }
    }

    async function toggleTodo(id) {
        try {
            const response = await fetch(`/api/todos/${id}/toggle`, {
                method: 'POST'
            });
            
            if (response.ok) {
                loadTodos();
                showToast('Todo updated!', 'success');
            } else {
                showError('Failed to update todo');
            }
        } catch (error) {
            console.error('Error:', error);
            showError('Could not update todo');
        }
    }

    async function deleteTodo(id) {
        if (!confirm('Are you sure you want to delete this todo?')) {
            return;
        }
        
        try {
            const response = await fetch(`/api/todos/${id}`, {
                method: 'DELETE'
            });
            
            if (response.ok) {
                loadTodos();
                showToast('Todo deleted!', 'success');
            } else {
                showError('Failed to delete todo');
            }
        } catch (error) {
            console.error('Error:', error);
            showError('Could not delete todo');
        }
    }

    function showToast(message, type = 'info') {
        const toastElement = document.getElementById('appToast');
        const toastTitle = document.getElementById('toastTitle');
        const toastContent = document.getElementById('toastContent');
        
        toastTitle.textContent = type === 'success' ? 'Success' : type === 'warning' ? 'Warning' : 'Info';
        toastContent.textContent = message;
        
        toastElement.classList.add('bg-' + (type === 'success' ? 'success' : type === 'warning' ? 'warning' : 'info'));
        const toast = new bootstrap.Toast(toastElement);
        toast.show();
        
        setTimeout(() => {
            toastElement.classList.remove('bg-success', 'bg-warning', 'bg-info');
        }, 2000);
    }

    function showError(message) {
        showToast(message, 'warning');
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    document.addEventListener('DOMContentLoaded', loadTodos);
</script>
{% endblock %}
